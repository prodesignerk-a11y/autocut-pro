version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autocut-postgres
    environment:
      POSTGRES_USER: autocut
      POSTGRES_PASSWORD: password
      POSTGRES_DB: autocut_pro
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U autocut -d autocut_pro']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - autocut-net

  redis:
    image: redis:7-alpine
    container_name: autocut-redis
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - autocut-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: autocut-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://autocut:password@postgres:5432/autocut_pro
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - autocut-net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    container_name: autocut-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://autocut:password@postgres:5432/autocut_pro
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      WORKER_CONCURRENCY: 2
      TEMP_DIR: /tmp/autocut
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - worker_temp:/tmp/autocut
    networks:
      - autocut-net
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: autocut-web
    env_file:
      - .env
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_URL: http://api:4000
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - autocut-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  worker_temp:

networks:
  autocut-net:
    driver: bridge
